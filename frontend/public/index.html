<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eagle Cricket Elite — High Intensity Box Cricket</title>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: #0f0f11;
        color: #e3e2e7;
        font-family: 'Hanken Grotesk', sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0f0f11; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::selection { background: #ffffff; color: #0f0f11; }

      /* Desktop: sidebar nav pushes content right */
      @media (min-width: 768px) {
        #root { padding-left: 220px; }
        .ebc-bottom-nav { display: none !important; }
        .ebc-sidebar    { display: flex !important; }
      }
      /* Mobile: bottom nav only */
      @media (max-width: 767px) {
        .ebc-sidebar    { display: none !important; }
        .ebc-bottom-nav { display: flex !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
